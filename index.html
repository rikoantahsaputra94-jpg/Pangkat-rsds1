<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pengajuan Pangkat</title>

<style>

:root{
--primary:#2563eb;
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,Segoe UI;
background:var(--bg);
color:var(--text);
}

/* WRAPPER */

.wrap{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */

.card{
width:100%;
max-width:900px;
background:var(--card);
border-radius:20px;
padding:24px;
box-shadow:0 20px 40px rgba(0,0,0,.12);
}

/* TITLE */

h2{
margin:0 0 20px;
text-align:center;
font-size:20px;
font-weight:700;
}

/* FORM GRID */

.form-grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

/* FIELD */

.field{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
color:var(--muted);
margin-bottom:5px;
}

input{
padding:12px 14px;
border-radius:12px;
border:1px solid #cbd5e1;
font-size:14px;
}

input:focus{
border-color:#93c5fd;
box-shadow:0 0 0 3px rgba(37,99,235,.15);
outline:none;
}

/* FILE */

.file-field{
grid-column:1 / -1;
}

/* BUTTON */

button{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:700;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:#fff;
cursor:pointer;
}

/* MESSAGE */

.msg{
margin-top:10px;
font-size:13px;
text-align:center;
color:var(--muted);
}

/* DESKTOP */

@media (min-width:768px){

.form-grid{
grid-template-columns:1fr 1fr;
}

.file-field{
grid-column:1 / -1;
}

button{
width:300px;
margin:auto;
display:block;
margin-top:20px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h2>Pengajuan Pangkat</h2>

<div class="form-grid">

<div class="field">
<label>Nama</label>
<input id="nama" list="dlNama" autocomplete="off">
<datalist id="dlNama"></datalist>
</div>

<div class="field">
<label>NIP</label>
<input id="nip" readonly>
</div>

<div class="field">
<label>Golongan</label>
<input id="gol" readonly>
</div>

<div class="field">
<label>Jabatan</label>
<input id="jab" readonly>
</div>

<div class="field">
<label>HP</label>
<input id="hp">
</div>

<div class="field">
<label>Email</label>
<input id="email">
</div>

<div class="field">
<label>Periode</label>
<input id="periode" readonly>
</div>

<div class="field file-field">
<label>Upload PDF</label>
<input id="file" type="file" accept="application/pdf" multiple>
</div>

</div>

<button id="submit">KIRIM</button>

<div id="msg" class="msg"></div>

</div>

</div>

<script>

/* =================================
   URL GOOGLE APPS SCRIPT API
================================= */

const API_URL = "https://script.google.com/macros/s/AKfycbzqERUeQF2hokgp-ssN3V4PJCldAKv09iq71PNMoi5z92vnspI7YeWd-G--55keg7bFpw/exec";

/* helper */

const $ = id => document.getElementById(id);

let timer = null;


/* ================================
   AUTOCOMPLETE NAMA
================================ */

$('nama').addEventListener('input', e=>{

clearTimeout(timer);

timer = setTimeout(()=>{

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"suggestNama",
q:e.target.value
})
})
.then(r=>r.json())
.then(list=>{

$('dlNama').innerHTML='';

list.forEach(n=>{

const o=document.createElement('option');
o.value=n;

$('dlNama').appendChild(o);

});

});

},200);

});


/* ================================
   AUTO FILL DATA
================================ */

$('nama').addEventListener('change',()=>{

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"lookupNama",
nama:$('nama').value
})
})
.then(r=>r.json())
.then(d=>{

if(!d) return;

$('nip').value=d.nip;
$('gol').value=d.gol;
$('jab').value=d.jab;

});

});


/* ================================
   AMBIL PERIODE OTOMATIS
================================ */

window.onload = ()=>{

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"periode"
})
})
.then(r=>r.json())
.then(p=>{

$('periode').value = p || '';

});

};


/* ================================
   SUBMIT DATA
================================ */

$('submit').onclick = async ()=>{

$('msg').innerText="Mengirim data...";

const files=[];

for(const f of $('file').files){

if(f.type!=="application/pdf"){
$('msg').innerText="Hanya file PDF yang diperbolehkan";
return;
}

const dataUrl = await new Promise(res=>{

const fr = new FileReader();

fr.onload = ()=>res(fr.result);

fr.readAsDataURL(f);

});

files.push({
name:f.name,
dataUrl
});

}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({

action:"submit",

nama:$('nama').value,
nip:$('nip').value,
gol:$('gol').value,
jab:$('jab').value,
hp:$('hp').value,
email:$('email').value,
periode:$('periode').value,
files

})
})
.then(r=>r.json())
.then(res=>{

if(res.error){

$('msg').innerText = res.error;
return;

}

$('msg').innerText="Berhasil dikirim";

setTimeout(()=>{

location.reload();

},1500);

});

};

</script>

</body>
</html>
