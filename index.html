<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pengajuan Pangkat</title>

<style>

:root{
--primary:#1e3a8a;
--primary2:#2563eb;
--bg:#f3f6fb;
--card:#ffffff;
--border:#e5e7eb;
--text:#111827;
--muted:#6b7280;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
}

/* HEADER */

.header{
background:var(--primary);
color:#fff;
padding:16px;
text-align:center;
font-weight:600;
font-size:16px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* WRAPPER */

.wrap{
padding:14px;
display:flex;
justify-content:center;
}

/* CARD */

.card{
width:100%;
max-width:800px;
background:var(--card);
border-radius:18px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
border:1px solid var(--border);
}

/* TITLE */

.title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
text-align:center;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

/* FIELD */

.field{
display:flex;
flex-direction:column;
}

label{
font-size:12px;
color:var(--muted);
margin-bottom:5px;
}

input{
padding:12px 14px;
border-radius:10px;
border:1px solid var(--border);
font-size:14px;
background:#fff;
}

input:focus{
border-color:var(--primary2);
outline:none;
box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* FILE */

.file{
grid-column:1/-1;
}

/* BUTTON */

button{
margin-top:10px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
width:100%;
}

/* MESSAGE */

.msg{
margin-top:10px;
font-size:13px;
text-align:center;
color:var(--muted);
}

/* DESKTOP */

@media(min-width:768px){

.grid{
grid-template-columns:1fr 1fr;
}

.file{
grid-column:1/-1;
}

button{
width:260px;
margin:auto;
display:block;
margin-top:18px;
}

}

</style>
</head>

<body>

<div class="header">
Sistem Kepegawaian RSDS
</div>

<div class="wrap">

<div class="card">

<div class="title">
Pengajuan Pangkat
</div>

<div class="grid">

<div class="field">
<label>Nama</label>
<input id="nama" list="dlNama">
<datalist id="dlNama"></datalist>
</div>

<div class="field">
<label>NIP</label>
<input id="nip" readonly>
</div>

<div class="field">
<label>Golongan</label>
<input id="gol" readonly>
</div>

<div class="field">
<label>Jabatan</label>
<input id="jab" readonly>
</div>

<div class="field">
<label>HP</label>
<input id="hp">
</div>

<div class="field">
<label>Email</label>
<input id="email">
</div>

<div class="field">
<label>Periode</label>
<input id="periode" readonly>
</div>

<div class="field file">
<label>Upload Berkas PDF</label>
<input id="file" type="file" accept="application/pdf" multiple>
</div>

</div>

<button id="submit">KIRIM PENGAJUAN</button>

<div id="msg" class="msg"></div>

</div>

</div>

<script>

/* ===============================
   API URL
================================ */

const API_URL="https://script.google.com/macros/s/AKfycbzqERUeQF2hokgp-ssN3V4PJCldAKv09iq71PNMoi5z92vnspI7YeWd-G--55keg7bFpw/exec"

const $=id=>document.getElementById(id)

let timer=null


/* ===============================
   AUTO ISI DARI DASHBOARD
================================ */

function loadProfile(){

const profile = JSON.parse(localStorage.getItem("rsds_profile"))

if(!profile) return

$('nama').value =
profile.NAMA || profile.nama || ""

$('nip').value =
profile.NIP || profile.nip || ""

$('gol').value =
profile.GOL || profile.GOLONGAN || profile.gol || ""

$('jab').value =
profile.JAB || profile.JABATAN || profile.jab || ""

}


/* ===============================
   AUTOCOMPLETE NAMA
================================ */

$('nama').addEventListener('input',e=>{

clearTimeout(timer)

timer=setTimeout(()=>{

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"suggestNama",
q:e.target.value
})
})
.then(r=>r.json())
.then(list=>{

$('dlNama').innerHTML=''

list.forEach(n=>{

const o=document.createElement('option')
o.value=n
$('dlNama').appendChild(o)

})

})

},200)

})


/* ===============================
   AUTO FILL DATA
================================ */

$('nama').addEventListener('change',()=>{

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"lookupNama",
nama:$('nama').value
})
})
.then(r=>r.json())
.then(d=>{

if(!d) return

$('nip').value=d.nip
$('gol').value=d.gol
$('jab').value=d.jab

})

})


/* ===============================
   LOAD HALAMAN
================================ */

window.onload=()=>{

/* LOAD PROFILE DARI DASHBOARD */

loadProfile()

/* AMBIL PERIODE */

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"periode"
})
})
.then(r=>r.json())
.then(p=>{
$('periode').value=p
})

}


/* ===============================
   SUBMIT DATA
================================ */

$('submit').onclick=async()=>{

$('msg').innerText="Mengirim..."

const files=[]

for(const f of $('file').files){

if(f.type!=="application/pdf"){
$('msg').innerText="Hanya file PDF"
return
}

const dataUrl=await new Promise(res=>{

const fr=new FileReader()
fr.onload=()=>res(fr.result)
fr.readAsDataURL(f)

})

files.push({
name:f.name,
dataUrl
})

}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({

action:"submit",

nama:$('nama').value,
nip:$('nip').value,
gol:$('gol').value,
jab:$('jab').value,
hp:$('hp').value,
email:$('email').value,
periode:$('periode').value,
files

})
})
.then(r=>r.json())
.then(res=>{

if(res.error){
$('msg').innerText=res.error
return
}

$('msg').innerText="Pengajuan berhasil"

setTimeout(()=>{
location.reload()
},1500)

})

}

</script>

</body>
</html>
